<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Pengalihan otomatis dalam waktu 1 detik -->
    <meta http-equiv="refresh" content="1;url=https://google.com">
    <title>Menuju Website UPTD SDN Gunung Sekar 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f9f9f9;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h2>Menghubungkan ke Website UPTD SDN Gunung Sekar 1...</h2>
    <div class="loader"></div>
    <p>Jika halaman tidak berpindah, <a href="https://google.com">klik di sini</a>.</p>

    <script>
        // Pengalihan cadangan menggunakan JavaScript
        setTimeout(function() {
            window.location.href = "https://google.com";
        }, 1000);
    </script>
</body>
</html>
